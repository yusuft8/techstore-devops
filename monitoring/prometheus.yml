global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'techstore-monitor'

scrape_configs:
  - job_name: 'techstore'
    static_configs:
      - targets: ['app:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

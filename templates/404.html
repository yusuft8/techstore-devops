<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sayfa Bulunamadı — TechStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0a0a0f; --accent:#6c63ff; --text:#e8e8f0; --muted:#6b6b8a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; }
        h1 { font-family:'Syne',sans-serif; font-size:6rem; font-weight:800; color:var(--accent); }
        p { color:var(--muted); margin:1rem 0 2rem; }
        a { background:var(--accent); color:white; text-decoration:none; padding:0.8rem 2rem; border-radius:12px; font-family:'Syne',sans-serif; font-weight:700; }
    </style>
</head>
<body>
<div>
    <h1>404</h1>
    <p>Aradığınız sayfa bulunamadı.</p>
    <a href="/">Ana Sayfaya Dön</a>
</div>
</body>
</html>
